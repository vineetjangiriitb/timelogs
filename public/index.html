<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SleepLogs</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Home View -->
  <section id="view-home" class="view active">
    <header class="app-header">
      <h1>&#9790; SleepLogs</h1>
    </header>

    <div class="status-card" id="status-card">
      <p class="status-text" id="status-text">Loading...</p>
      <p class="status-timer" id="status-timer"></p>
    </div>

    <div class="hero-btn-container">
      <button id="sleep-btn" class="hero-btn state-awake" onclick="toggleSleep()">
        <span class="hero-icon" id="hero-icon">&#9790;</span>
        <span class="hero-label" id="hero-label">I'm going to sleep</span>
      </button>
    </div>

    <div class="today-card" id="today-card" style="display:none;">
      <p class="today-title">Last sleep</p>
      <p class="today-duration" id="today-duration"></p>
      <div class="today-quality" id="today-quality"></div>
    </div>
  </section>

  <!-- History View -->
  <section id="view-history" class="view">
    <header class="app-header">
      <h1>&#128203; History</h1>
    </header>
    <div class="history-list" id="history-list">
      <p class="empty-msg">Loading...</p>
    </div>
  </section>

  <!-- Charts View -->
  <section id="view-charts" class="view">
    <header class="app-header">
      <h1>&#128200; Charts</h1>
    </header>
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="loadCharts(7)">7 Days</button>
      <button class="chart-tab" onclick="loadCharts(30)">30 Days</button>
    </div>
    <div class="stats-summary" id="stats-summary"></div>
    <div class="chart-container">
      <h3>Sleep Duration</h3>
      <canvas id="duration-chart"></canvas>
    </div>
    <div class="chart-container">
      <h3>Sleep Quality</h3>
      <canvas id="quality-chart"></canvas>
    </div>
  </section>

  <!-- Quality Rating Modal -->
  <div class="modal-overlay" id="quality-modal" style="display:none;">
    <div class="modal">
      <h2>How was your sleep?</h2>
      <div class="star-rating" id="star-rating">
        <button class="star" data-val="1">&#9733;</button>
        <button class="star" data-val="2">&#9733;</button>
        <button class="star" data-val="3">&#9733;</button>
        <button class="star" data-val="4">&#9733;</button>
        <button class="star" data-val="5">&#9733;</button>
      </div>
      <button class="modal-btn" id="modal-submit" onclick="submitWake()">Save</button>
      <button class="modal-btn modal-skip" onclick="submitWake(true)">Skip</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="home" onclick="switchView('home')">
      <span class="nav-icon">&#127969;</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" data-view="history" onclick="switchView('history')">
      <span class="nav-icon">&#128203;</span>
      <span class="nav-label">History</span>
    </button>
    <button class="nav-btn" data-view="charts" onclick="switchView('charts')">
      <span class="nav-icon">&#128200;</span>
      <span class="nav-label">Charts</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
